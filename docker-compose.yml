services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  auth-api:
    build: ./auth-api
    ports:
      - "8080:8080"
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/auth_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      JWT_SECRET: 4fdH334jj8kjf40n3hd3jdkejd322kdnj32n2dnjsd2f4b
      INTERNAL_TOKEN: dev-internal-token
      DATA_API_URL: http://data-api:8081
    depends_on:
      - postgres
      - data-api

  data-api:
    build: ./data-api
    ports:
      - "8081:8081"
    environment:
      INTERNAL_TOKEN: dev-internal-token

volumes:
  pgdata:
